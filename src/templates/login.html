<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login — TWITCH-Generator</title>
<style>
  body { margin:0; min-height:100vh; display:grid; place-items:center; font:15px/1.5 system-ui,sans-serif; background:#0e0e12; color:#e6e6ea; }
  .box { background:#1a1a22; border:1px solid #2a2a35; border-radius:14px; padding:28px; width:320px; }
  h1 { font-size:18px; margin:0 0 4px; } .sub { color:#9a9aa8; font-size:13px; margin:0 0 18px; }
  label { display:block; font-size:13px; color:#9a9aa8; margin:12px 0 4px; }
  input { width:100%; padding:10px 12px; background:#11111a; border:1px solid #2a2a35; border-radius:8px; color:#e6e6ea; box-sizing:border-box; }
  button { width:100%; margin-top:20px; background:#9146ff; color:#fff; border:0; padding:11px; border-radius:8px; font-weight:600; cursor:pointer; }
  .err { background:#3a1620; border:1px solid #633; color:#fbc; padding:9px 12px; border-radius:8px; font-size:13px; margin-bottom:12px; }
  .dot { color:#9146ff; }
</style>
</head>
<body>
  <form class="box" method="post" action="{{ base }}/login">
    <h1><span class="dot">●</span> TWITCH-Generator</h1>
    <p class="sub">Sign in to continue</p>
    {% if error %}<div class="err">{{ error }}</div>{% endif %}
    <label>Username</label>
    <input type="text" name="username" autofocus autocomplete="username">
    <label>Password</label>
    <input type="password" name="password" autocomplete="current-password">
    <button type="submit">Sign in</button>
  </form>
</body>
</html>
